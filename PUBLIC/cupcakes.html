<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyLand-Cupcakes</title>
    <link rel="stylesheet" href="../CSS/padrao.css">
    <link rel="stylesheet" href="../CSS/menu.css">
</head>
<body>
     <header class="topo">
      <img src="../IMAGENS/Logo.png" alt="CandyLand" class="image" />
        </h2>
    </header>

    <hr class="line" />

    <!-- INÍCIO DO ARTIGO -->

    <article class="menu-article">
      <div class="div-menu">
        <img src="../IMAGENS/cupcake-triple-chocolate.webp" alt="Chocolate triplo" class="img-menu" />
        <p class="name-menu">Chocolate Triplo</p>
      </div>
      <div class="div-menu">
        <img src="../IMAGENS/Cupcake-Tiramisù.jpg" alt="Tiramisù" class="img-menu">
        <p class="name-menu">Tiramisù</p>
      </div>
      
      <div class="div-menu">
        <img src="../IMAGENS/cupcake-oreo.jpg" alt="Oreo" class="img-menu">
        <p class="name-menu">Oreo</p>
      </div>
      
      <div class="div-menu">
        <img src="../IMAGENS/cupcake-carrot-cake.jpg" alt="Cupcake de Cenoura" class="img-menu">
        <p class="name-menu">Cupcake de Cenoura</p>
      </div>

      <div class="div-menu">
        <img src="../IMAGENS/cupcake-Strawberries-with-Whipped-Cream.jpg" alt="Morango com chantilly" class="img-menu">
        <p class="name-menu">Morango com Chantilly</p>
      </div>
        
      <div class="div-menu">
        <img src="../IMAGENs/cupcake-blueberry.jpg" alt="Blueberry" class="img-menu">
        <p class="name-menu">Blueberry</p>
      </div>
      
    </article>

<!-- FIM DO ARTIGO -->

    <footer class="rodape">
      <div class="media">
        <h2 class="media-tittle">midias sociais:</h2>
        <img src="../IMAGENS/face-logo.png" alt="Facebook" class="img-footer" />
        <img
          src="../IMAGENS/instagram-logo.png"
          alt="Instagram"
          class="img-footer"
        />
      </div>
       <article class="about">
       <a href="about.html"> <img src="../IMAGENS/about.png" alt="Sobre nós" class="about-img"> </a>
      </article> 
      <div class="payment">
        <div class="div-card">
          <img
            src="../IMAGENS/Credit.png"
            alt="Cartão de crédito"
            class="payment-img"
          />
          <img src="../IMAGENS/pix.png" alt="Pix" class="payment-img" />
          <h3 class="payment-tittle">Formas de pagamento</h3>
        </div>
      </div>
    </footer>

</body>
</html>
