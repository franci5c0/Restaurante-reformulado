<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CandyLand</title>
    <link rel="stylesheet" href="../CSS/padrao.css" />
    <link rel="stylesheet" href="../CSS/index.css" />

  <body>
    <header class="topo">

        <img src="../IMAGENS/Logo.png" alt="CandyLand" class="image" />

      <div class="main-tittle">

    <!----------------------------------------------->

    <hr class="line" />

    <section class="sessao">
      <article class="artigo">
        <img src="../IMAGENS/cupcakes.png" alt="Cupcakes" class="img-menu" />
        <img src="../IMAGENS/pudim.jfif" alt="Pudins" class="img-menu" />
        <img src="../IMAGENS/cakes.jfif" alt="Bolos" class="img-menu" />
      </article>

      <article class="artigo">
        <img
          src="../IMAGENS/cheesecakes.jfif"
          alt="Cheesecakes"
          class="img-menu"
        />

    </section>

    <hr class="line" />
    <footer class="rodape"></footer>
