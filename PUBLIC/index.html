<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CandyLand</title>
    <link rel="stylesheet" href="../CSS/padrao.css" />
    <link rel="stylesheet" href="../CSS/index.css" />
  </head>
  <body>
    <header class="topo">
      <img src="../IMAGENS/Logo.png" alt="CandyLand" class="image" />
        <h1 class="main-tittle">Bem-vindo(a) a CandyLand!</h1>
        <h2 class="second-tittle">
          Acesse nossos cardápios para fazer seu pedido.
        </h2>
    </header>

    <!----------------------------------------------->

    <hr class="line" />

    <section class="sessao">
      <article class="artigo">
       <a class="menu-link" href="cupcakes.html">
         <img src="../IMAGENS/cupcakes.png" alt="Cupcakes" class="img-menu" />
       </a>
        <img src="../IMAGENS/pudim.jfif" alt="Pudins" class="img-menu" />
        <img src="../IMAGENS/cakes.jfif" alt="Bolos" class="img-menu" />
      </article>

      <article class="artigo">
        <img
          src="../IMAGENS/cheesecakes.jfif"
          alt="Cheesecakes"
          class="img-menu"
        />
        <img src="../IMAGENS/Icecream.png" alt="Sorvetes" class="img-menu" />
        <img src="../IMAGENS/Donuts.png" alt="Donuts" class="img-menu" />
      </article>

      <article class="artigo">
        <img src="../IMAGENS/Quindins.png" alt="Quindins" class="img-menu" />
        <img src="../IMAGENS/Mousses.png" alt="Mousses" class="img-menu" />
        <img src="../IMAGENS/Brownies.png" alt="Brownies" class="img-menu" />
      </article>
    </section>

    <!----------------------------------------------->

    <hr class="line" />

    <footer class="rodape">
      <div class="media">
        <h2 class="media-tittle">midias sociais:</h2>
        <img src="../IMAGENS/face-logo.png" alt="Facebook" class="img-footer" />
        <img
          src="../IMAGENS/instagram-logo.png"
          alt="Instagram"
          class="img-footer"
        />
      </div>
       <article class="about">
        <img src="../IMAGENS/about.png" alt="Sobre nós" class="about-img">
      </article> 
      <div class="payment">
        <div class="div-card">
          <img
            src="../IMAGENS/Credit.png"
            alt="Cartão de crédito"
            class="payment-img"
          />
          <img src="../IMAGENS/pix.png" alt="Pix" class="payment-img" />
          <h3 class="payment-tittle">Formas de pagamento</h3>
        </div>
      </div>
    </footer>
  </body>
</html>
